---
- name: SSO 사용자 자동 프로비저닝
  hosts: localhost
  gather_facts: no
  vars:
    mg_profile: "mg-infra-admin"
    region: "us-east-1"
    
  tasks:
    - name: SSO 인스턴스 정보 가져오기
      amazon.aws.aws_ssoadmin_instance_info:
        profile: "{{ mg_profile }}"
        region: "{{ region }}"
      register: sso_instances
      
    - name: 사용자 정보 설정
      set_fact:
        identity_store_id: "{{ sso_instances.instances[0].identity_store_id }}"
        instance_arn: "{{ sso_instances.instances[0].instance_arn }}"
        user_email: "{{ user_input_email | default('jangeyq34@gmail.com') }}"
        
    - name: 이메일에서 사용자 정보 추출
      set_fact:
        mogam_username: "changgeun.jang@mogam.re.kr"
        first_name: "changgeun"
        last_name: "jang"
        display_name: "changgeun jang"
      when: "'jangeyq34' in user_email"
      
    - name: SSO 사용자 생성
      amazon.aws.aws_identitystore_user:
        identity_store_id: "{{ identity_store_id }}"
        username: "{{ mogam_username }}"
        given_name: "{{ first_name }}"
        family_name: "{{ last_name }}"
        display_name: "{{ display_name }}"
        emails:
          - value: "{{ mogam_username }}"
            type: "work"
            primary: true
        profile: "{{ mg_profile }}"
        region: "{{ region }}"
        state: present
      register: created_user
      
    - name: 애플리케이션 목록 가져오기
      amazon.aws.aws_ssoadmin_application_info:
        instance_arn: "{{ instance_arn }}"
        profile: "{{ mg_profile }}"
        region: "{{ region }}"
      register: applications
      
    - name: AQ 애플리케이션 찾기
      set_fact:
        aq_application: "{{ item }}"
      loop: "{{ applications.applications }}"
      when: "'AQ' in item.name"
      
    - name: 사용자를 AQ 애플리케이션에 할당
      amazon.aws.aws_ssoadmin_application_assignment:
        application_arn: "{{ aq_application.application_arn }}"
        principal_id: "{{ created_user.user_id }}"
        principal_type: "USER"
        profile: "{{ mg_profile }}"
        region: "{{ region }}"
        state: present
      when: aq_application is defined
      
    - name: 결과 출력
      debug:
        msg:
          - "SSO 사용자 생성 완료"
          - "사용자명: {{ mogam_username }}"
          - "표시명: {{ display_name }}"
          - "사용자 ID: {{ created_user.user_id }}"
          - "AQ 애플리케이션 할당: {{ 'Yes' if aq_application is defined else 'No' }}"
